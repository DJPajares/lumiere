services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: lumiere
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - lumiere_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lumiere"]
      interval: 2s
      timeout: 5s
      retries: 20

volumes:
  lumiere_postgres_data:

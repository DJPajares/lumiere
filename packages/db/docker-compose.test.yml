services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: lumiere_test
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "54329:5432"
    volumes:
      - ./drizzle:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lumiere_test"]
      interval: 2s
      timeout: 5s
      retries: 20

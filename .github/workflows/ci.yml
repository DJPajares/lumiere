name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lumiere_ci
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-placeholder
      SUPABASE_JWT_SECRET: ci-jwt-secret-placeholder
      INVITE_TOKEN_SECRET: ci-invite-token-secret-placeholder
      PUBLIC_APP_BASE_URL: http://localhost:3000
      DASHBOARD_APP_BASE_URL: http://localhost:3001
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      NEXT_PUBLIC_APP_NAME: Lumiere
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key-placeholder
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Resolve pnpm store
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Check theme ownership boundaries
        run: pnpm check:theme-boundaries

      - name: Check Next Image contracts
        run: pnpm check:next-image-usage

      - name: Check theme registry contracts
        run: pnpm check:theme-contracts

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
